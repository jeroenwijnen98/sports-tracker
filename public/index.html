<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sports Tracker</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>

  <!-- Auth Screen -->
  <div id="auth-screen" class="auth-screen">
    <div>
      <h1>Sports Tracker</h1>
      <p>Connect met je Polar account om je hardloopactiviteiten te synchroniseren en bij te houden.</p>
    </div>
    <a href="/auth/login" class="btn btn-primary">Connect with Polar</a>
  </div>

  <!-- App Screen -->
  <div id="app-screen" class="app-screen">
    <header class="app-header">
      <h1>Sports Tracker</h1>
      <div class="header-actions">
        <button id="import-btn" class="btn-icon btn-ghost" title="Import TCX">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </button>
        <input type="file" id="import-file-input" multiple accept=".tcx,.json" hidden>
        <button id="sync-btn" class="btn-icon btn-ghost sync-btn" title="Sync">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
            <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
          </svg>
        </button>
        <button id="logout-btn" class="btn-icon btn-ghost" title="Logout">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="activities">Recent Runs</button>
      <button class="tab-btn" data-tab="activity">Activity</button>
      <button class="tab-btn" data-tab="shoes">Shoes</button>
    </nav>

    <main class="tab-content">
      <div id="tab-activities" class="tab-panel active"></div>
      <div id="tab-activity" class="tab-panel"></div>
      <div id="tab-shoes" class="tab-panel"></div>
    </main>
  </div>

  <!-- Run detail overlay -->
  <div id="run-detail-container" class="run-detail-container"></div>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Modal container -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal" id="modal"></div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
